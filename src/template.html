<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>My Projects</h1>
        <button id="add-project-button">New Project</button>
      </div>
      <ul id="project-list"></ul>
    </div>
    <div class="content"></div>

    <dialog class="modal" id="project-dialog">
      <form id="project-form">
        <h1>New Project</h1>
        <div id="project-form-inputs">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div id="project-form-buttons">
          <button type="button">Cancel</button>
          <button type="submit">OK</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="edit-project-dialog">
      <form id="edit-project-form">
        <h1>Edit Project</h1>
        <div id="project-form-inputs">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div id="project-form-buttons">
          <button type="button">Cancel</button>
          <button type="button">Delete</button>
          <button type="submit">OK</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="todo-dialog">
      <form id="todo-form">
        <h1>New Task</h1>
        <div class="form-inputs">
          <label for="todo-name">Name:</label>
          <input type="text" name="todo-name" id="todo-name" required />

          <label for="notes">Notes:</label>
          <textarea name="notes" id="notes"></textarea>

          <label for="date">Date:</label>
          <input type="date" name="date" />

          <label for="time">Time:</label>
          <input type="time" name="time" id="time" />

          <label for="priority">Priority:</label>
          <select name="priority" id="priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div>
          <button type="button">Cancel</button>
          <button type="submit">OK</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
